<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">

  <meta property="og:type" content="website">
  <meta property="og:title" content="{{ page.title | default: site.title }}">
  <meta property="og:description" content="{{ page.description | default: site.description }}">
  <meta property="og:url" content="{{ site.url }}{{ page.url }}">
  {% if site.og_image %}<meta property="og:image" content="{{ site.url }}/images/{{ site.og_image }}">{% endif %}
  <meta name="twitter:card" content="summary">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="{{ '/images/favicon.svg' | relative_url }}">
  <link rel="icon" type="image/png" sizes="32x32" href="{{ '/images/favicon-32x32.png' | relative_url }}">
  <link rel="apple-touch-icon" sizes="180x180" href="{{ '/images/apple-touch-icon-180x180.png' | relative_url }}">
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#111315" media="(prefers-color-scheme: dark)">

  <!-- Pre-paint theme (avoid flash) -->
  <script>
    (function () {
      try {
        var saved = localStorage.getItem('theme');
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        var theme = saved || (prefersDark ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
      } catch (e) {}
    })();
  </script>

  <!-- Style -->
  <link rel="stylesheet" href="{{ '/assets/css/home.css' | relative_url }}">

  <!-- Math -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" crossorigin="anonymous">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js" crossorigin="anonymous"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js" crossorigin="anonymous"></script>
</head>

<body>
  <header class="header">
    <nav class="navbar" aria-label="Primary">
      <a href="{{ '/' | relative_url }}" class="navbar-brand">{{ site.title }}</a>
      <div class="navbar-links">
        <a href="#about" class="nav-link">About</a>
        <a href="#news" class="nav-link">News</a>
        <a href="#experience" class="nav-link">Experience</a>
        <a href="#publications" class="nav-link">Publications</a>
      </div>
      <button id="theme-toggle-btn" type="button" aria-label="Toggle dark mode">
        <span class="sun-icon">☀️</span>
        <span class="moon-icon">🌙</span>
      </button>
    </nav>
  </header>

  <main class="container">
    <div class="home">
      {{ content }}
    </div>
  </main>

  <footer class="footer">
    &copy; {{ 'now' | date: "%Y" }} {{ site.title }}. Built with
    <a href="https://jekyllrb.com/" target="_blank" rel="noopener">Jekyll</a>, hosted on
    <a href="https://pages.github.com/" target="_blank" rel="noopener">GitHub Pages</a>.
  </footer>

  <script src="{{ '/assets/js/home.js' | relative_url }}"></script>
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      if (window.renderMathInElement) {
        renderMathInElement(document.body, {
          delimiters: [
            { left: "$$", right: "$$", display: true },
            { left: "$", right: "$", display: false }
          ]
        });
      }
    });
  </script>
</body>
</html>
